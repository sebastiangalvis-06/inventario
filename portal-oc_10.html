<script>
let supabaseClient;
let currentAdmin = false;
let proveedoresCache = [];

function initSupabase(){
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  if(window.pdfjsLib){
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }
}

const ESTADOS = ["Aprobado","Preparando","En tránsito","Recibido parcial","Recibido total"];

function daysSince(dateStr){
  if(!dateStr) return 0;
  const diff = Date.now() - new Date(dateStr).getTime();
  return Math.floor(diff / (1000*60*60*24));
}

function showToast(msg){
  let t = document.getElementById("toast");
  if(!t){
    t = document.createElement("div");
    t.id = "toast";
    t.className = "toast";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

function slugify(nombre){
  const base = nombre.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,8) || "PROV";
  const rand = Math.floor(1000 + Math.random()*9000);
  return base + rand;
}

/* ==================== ROUTER ==================== */
function boot(){
  try{
    if(!window.supabase){
      throw new Error("No se pudo cargar la librería de Supabase. Verifica tu conexión a internet e intenta de nuevo.");
    }
    initSupabase();
    const params = new URLSearchParams(window.location.search);
    const prov = params.get("prov");
    if(prov){
      renderProviderView(prov);
    } else {
      renderGate();
    }
  }catch(err){
    document.getElementById("app").innerHTML = `
      <div style="max-width:480px;margin:80px auto;text-align:center;font-family:'Be Vietnam Pro',sans-serif;color:#EDEDED;">
        <h1 style="font-size:20px;">Algo salió mal</h1>
        <p style="color:#9A9A9E;font-size:14px;">${escapeHtml(err.message)}</p>
      </div>
    `;
  }
}

/* ==================== GATE (COMPRAS) ==================== */
function renderGate(){
  document.getElementById("app").innerHTML = `
    <div class="topbar">
      <div class="brand"><div class="mark"></div><div class="brand-text"><b>SOMOS</b> · Portal OC</div></div>
    </div>
    <div class="gate">
      <h1>Acceso compras</h1>

/* ==================== VISTA PROVEEDOR ==================== */
async function renderProviderView(code){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><div class="mark"></div><div class="brand-text"><b>SOMOS</b> · Portal OC</div></div>
      <div class="role-tag">Vista proveedor</div>
    </div>
    <div id="prov-content"><p class="empty">Cargando tus órdenes...</p></div>
  `;

  const { data: proveedor } = await supabaseClient.from("oc_proveedores").select("*").eq("code", code).maybeSingle();
  const content = document.getElementById("prov-content");

  if(!proveedor){
    content.innerHTML = `<p class="empty">No encontramos órdenes para este link. Verifica con tu contacto de compras.</p>`;
    return;
  }

  const { data: ordenes } = await supabaseClient
    .from("oc_ordenes")
    .select("*, oc_items(*)")
    .eq("proveedor_code", code)
    .order("fecha_creacion", { ascending:false });

  let html = `<h1>Hola, ${proveedor.nombre}</h1><p class="subtitle">Aquí puedes ver el estado de tus órdenes y actualizar cada producto: marca en qué va y deja una nota si es necesario.</p>`;

  if(!ordenes || ordenes.length === 0){
    html += `<p class="empty">Todavía no tienes órdenes registradas.</p>`;
  } else {
    ordenes.forEach(oc=>{
      html += renderOrdenCard(oc, true);
    });
  }
  content.innerHTML = html;
  attachItemHandlers(true);
}

/* ==================== RENDER DE UNA ORDEN (compartido) ==================== */
function renderOrdenCard(oc, editable, proveedorNombre){
  const items = (oc.oc_items || []).sort((a,b)=> a.producto.localeCompare(b.producto));
  const completada = items.length > 0 && items.every(it => it.estado === "Recibido total");
  const anyAtrasado = !completada && items.some(it => it.estado !== "Recibido total" && daysSince(it.actualizado_en) > DIAS_ALERTA);

  let itemsHtml = items.map(it => renderItemRow(oc.id, it, editable)).join("");
  if(items.length === 0) itemsHtml = `<p class="empty" style="padding:16px 0;">Sin productos registrados en esta orden.</p>`;

  let badgeClass = "ok";
  let badgeText = "Al día";
  if(completada){ badgeClass = "completada"; badgeText = "Completada"; }
  else if(anyAtrasado){ badgeClass = "atrasado"; badgeText = "Atrasado"; }

  return `
    <div class="card${completada ? " completada" : ""}">
      <div class="card-head">
        <div>
          <div class="oc-number">OC ${escapeHtml(oc.numero_oc)}</div>
          <div class="oc-meta">${proveedorNombre ? escapeHtml(proveedorNombre)+" · " : ""}Creada ${oc.fecha_creacion || "-"}${oc.fecha_estimada ? " · Estimada "+oc.fecha_estimada : ""}</div>
        </div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
      ${oc.nota_general ? `<div class="nota-view">Nota general: ${escapeHtml(oc.nota_general)}</div>` : ""}
      ${itemsHtml}
    </div>
  `;
}

function renderItemRow(ordenId, it, editable){
  const idx = ESTADOS.indexOf(it.estado);
  const currentIdx = idx === -1 ? 0 : idx;
  const atrasado = it.estado !== "Recibido total" && daysSince(it.actualizado_en) > DIAS_ALERTA;

  const stepperHtml = ESTADOS.map((label, i)=>{
    let cls = "step";
    if(i < currentIdx) cls += " done";
    if(i === currentIdx) cls += " current";
    return `<div class="${cls}"><div class="line"></div><div class="dot"></div><div class="lbl">${label}</div></div>`;
  }).join("");

  const controls = editable ? `
    <div class="item-controls" data-item-id="${it.id}">
      <div class="field">
        <label>Estado</label>
        <select class="estado-select">
          ${ESTADOS.map(e=>`<option value="${e}" ${e===it.estado?"selected":""}>${e}</option>`).join("")}
        </select>
      </div>
      <div class="field" style="flex:2;">
        <label>Nota (opcional)</label>
        <input class="nota-input" type="text" placeholder="Ej: sale de fábrica el 15" value="${escapeAttr(it.nota_proveedor || "")}" />
      </div>
      <button class="small primary save-item-btn">Guardar</button>
      <span class="saved-tick">Guardado ✓</span>
    </div>
  ` : (it.nota_proveedor ? `<div class="nota-view">Nota del proveedor: ${escapeHtml(it.nota_proveedor)}</div>` : "");

  return `
    <div class="item-row">
      <div class="item-top">
        <div>
          <div class="item-name">${escapeHtml(it.producto)} ${atrasado ? '<span class="badge atrasado" style="margin-left:8px;">Atrasado</span>' : ""}</div>
          <div class="item-qty">${it.cantidad ?? ""} ${escapeHtml(it.unidad || "")}</div>
        </div>
      </div>
      <div class="stepper">${stepperHtml}</div>
      ${controls}
    </div>
  `;
}

function attachItemHandlers(isProviderView){
  document.querySelectorAll(".save-item-btn").forEach(btn=>{
    btn.onclick = async ()=>{
      const wrap = btn.closest(".item-controls");
      const itemId = wrap.getAttribute("data-item-id");
      const estado = wrap.querySelector(".estado-select").value;
      const nota = wrap.querySelector(".nota-input").value.trim();
      btn.disabled = true;
      const { error } = await supabaseClient.from("oc_items").update({
        estado, nota_proveedor: nota, actualizado_en: new Date().toISOString()
      }).eq("id", itemId);
      btn.disabled = false;
      if(error){
        showToast("No se pudo guardar. Intenta de nuevo.");
      } else {
        const tick = wrap.querySelector(".saved-tick");
        tick.style.display = "inline";
        setTimeout(()=>tick.style.display="none", 1800);
        showToast("Estado actualizado");
      }
    };
  });
}

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><div class="mark"></div><div class="brand-text"><b>SOMOS</b> · Portal OC</div></div>
      <div class="role-tag">Vista compras</div>
    </div>
    <div class="tabs">

async function loadProveedoresCache(){
  const { data } = await supabaseClient.from("oc_proveedores").select("*").order("nombre");
  proveedoresCache = data || [];
}

/* ---- TAB: SEGUIMIENTO ---- */
async function renderTabSeguimiento(){
  const content = document.getElementById("tab-content");
  content.innerHTML = `<p class="empty">Cargando órdenes...</p>`;

  const { data: ordenes } = await supabaseClient
    .from("oc_ordenes")
    .select("*, oc_items(*)")
    .order("fecha_creacion", { ascending:false });

  if(!ordenes || ordenes.length === 0){
    content.innerHTML = `<p class="empty">Aún no hay órdenes registradas. Súbela en la pestaña "Subir OC".</p>`;
    return;
  }

  const provMap = {};
  proveedoresCache.forEach(p => provMap[p.code] = p.nombre);

  const isCompletada = (oc) => {
    const items = oc.oc_items || [];
    return items.length > 0 && items.every(it => it.estado === "Recibido total");
  };
  const activas = ordenes.filter(oc => !isCompletada(oc));
  const completadas = ordenes.filter(oc => isCompletada(oc));

  let html = "";
  [...activas, ...completadas].forEach(oc=>{
    html += renderOrdenCard(oc, false, provMap[oc.proveedor_code] || oc.proveedor_code);
  });
  content.innerHTML = html;
}

/* ---- LECTURA DE PDF DE ARTEMIS ---- */
async function extractOCFromPDF(file){
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = "";
  for(let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    fullText += content.items.map(it => it.str).join(" ") + " ";
  }
  return parseOCText(fullText);
}

function parseOCText(text){
  const result = { numero_oc:"", fecha:"", proveedor_nombre:"", items:[] };

  let m;
  m = text.match(/C[oó]digo de orden:\s*(\S+)/i);
  if(m) result.numero_oc = m[1];

  m = text.match(/Fecha de creaci[oó]n:\s*(\S+)/i);
  if(m){
    const parts = m[1].split(/[\/\-]/);
    if(parts.length === 3){
      const [d, mo, y] = parts;
      result.fecha = `${y.length===4?y:"20"+y}-${mo.padStart(2,"0")}-${d.padStart(2,"0")}`;
    }
  }

  m = text.match(/Raz[oó]n Social:\s*(.+?)\s*(?=Documento:)/i);
  if(m) result.proveedor_nombre = m[1].trim();

  const prodStart = text.search(/PRODUCTOS/i);
  const totalStart = text.search(/Subtotal\s+COP\s*\$/i);
  if(prodStart !== -1){
    const section = text.slice(prodStart, totalStart !== -1 ? totalStart : text.length);
    const rowRegex = /([A-ZÁÉÍÓÚÑÜ0-9][A-ZÁÉÍÓÚÑÜ0-9\s]{2,60}?)\s+(\d+)\s*COP\s*\$\s*[\d.,]+\s*COP\s*\$\s*[\d.,]+\s*COP\s*\$\s*[\d.,]+\s*COP\s*\$\s*[\d.,]+/g;
    let row;
    while((row = rowRegex.exec(section)) !== null){
      const nombre = row[1].replace(/\s+/g," ").trim();
      if(nombre === "Producto Cantidad Precio Unitario Subtotal Impuestos Total".slice(0, nombre.length)) continue;
      result.items.push({ producto: nombre, cantidad: parseInt(row[2], 10), unidad: "" });
    }
  }

  return result;
}

let newItemCount = 0;

function renderTabCrear(){
  const content = document.getElementById("tab-content");
  const provOptions = proveedoresCache.map(p=>`<option value="${p.code}">${escapeHtml(p.nombre)}</option>`).join("");

  content.innerHTML = `
    <div class="card">
      <h2>Subir OC desde PDF de Artemis</h2>
      <p class="subtitle" style="margin-bottom:14px;">Sube el PDF que exporta Artemis y se autocompletan el proveedor, el número de OC y los productos. Revisa los datos antes de guardar.</p>
      <input type="file" id="pdf-input" accept="application/pdf" />
      <div id="pdf-status" style="margin-top:10px;font-size:13px;color:var(--text-muted);"></div>
    </div>

    <div class="card">
      <h2>Registrar orden de compra</h2>
      <p class="subtitle" style="margin-bottom:18px;">Revisa o completa los datos y confirma para crear la orden. El proveedor podrá actualizar los productos desde su link personalizado.</p>

      <div class="row">
        <div class="field">
          <label>Proveedor</label>
          <select id="oc-proveedor">
            <option value="">Selecciona un proveedor</option>
            ${provOptions}
            <option value="__nuevo__">+ Nuevo proveedor</option>
          </select>
        </div>
        <div class="field">
          <label>Número de OC</label>
          <input id="oc-numero" type="text" placeholder="Ej: OC-2026-0145" />
        </div>
      </div>

      <div id="nuevo-proveedor-box" style="display:none;" class="field">
        <label>Nombre del nuevo proveedor</label>
        <input id="oc-nuevo-nombre" type="text" placeholder="Ej: Shenzhen Topleo" />
      </div>

      <div class="row">
        <div class="field">
          <label>Fecha estimada de entrega</label>
          <input id="oc-fecha" type="date" />
        </div>
        <div class="field">
          <label>Nota general (opcional)</label>
          <input id="oc-nota" type="text" placeholder="Ej: Envío parcial, resto en julio" />
        </div>
      </div>

      <label style="margin-top:8px;">Productos</label>
      <div id="items-container"></div>
      <button class="ghost small" id="add-item-btn" style="margin-bottom:20px;">+ Agregar producto</button>

      <div>
        <button class="primary" id="submit-oc-btn">Registrar orden</button>
      </div>
      <div id="oc-result" style="margin-top:16px;"></div>
    </div>
  `;

  document.getElementById("oc-proveedor").onchange = (e)=>{
    document.getElementById("nuevo-proveedor-box").style.display = e.target.value === "__nuevo__" ? "block" : "none";
  };

  document.getElementById("add-item-btn").onclick = addItemRow;
  addItemRow();
  addItemRow();

  document.getElementById("pdf-input").onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const status = document.getElementById("pdf-status");
    status.textContent = "Leyendo PDF y registrando la orden...";
    status.style.color = "var(--text-muted)";
    try{
      const parsed = await extractOCFromPDF(file);
      fillFormFromPDF(parsed);
      await submitOC();
      status.textContent = `Orden ${parsed.numero_oc || ""} registrada automáticamente.`;
      status.style.color = "var(--green)";
      e.target.value = "";
    }catch(err){
      status.textContent = "No se pudo leer o registrar el PDF automáticamente. Revisa los datos abajo y da clic en Registrar orden.";
      status.style.color = "var(--red)";
    }
  };

  document.getElementById("submit-oc-btn").onclick = submitOC;
}

function fillFormFromPDF(parsed){
  if(parsed.numero_oc) document.getElementById("oc-numero").value = parsed.numero_oc;
  if(parsed.fecha) document.getElementById("oc-fecha").value = parsed.fecha;

  const provSelect = document.getElementById("oc-proveedor");
  if(parsed.proveedor_nombre){
    const match = proveedoresCache.find(p => p.nombre.trim().toLowerCase() === parsed.proveedor_nombre.trim().toLowerCase());
    if(match){
      provSelect.value = match.code;
      document.getElementById("nuevo-proveedor-box").style.display = "none";
    } else {
      provSelect.value = "__nuevo__";
      document.getElementById("nuevo-proveedor-box").style.display = "block";
      document.getElementById("oc-nuevo-nombre").value = parsed.proveedor_nombre;
    }
  }

  if(parsed.items && parsed.items.length > 0){
    document.getElementById("items-container").innerHTML = "";
    parsed.items.forEach(it=>{
      addItemRow();
      const rows = document.querySelectorAll(".new-item-row");
      const lastRow = rows[rows.length - 1];
      lastRow.querySelector(".ni-producto").value = it.producto;
      lastRow.querySelector(".ni-cantidad").value = it.cantidad ?? "";
      lastRow.querySelector(".ni-unidad").value = it.unidad ?? "";
    });
  }
}

function addItemRow(){
  newItemCount++;
  const container = document.getElementById("items-container");
  const rowId = "item-" + newItemCount;
  const div = document.createElement("div");
  div.className = "new-item-row";
  div.id = rowId;
  div.innerHTML = `
    <div class="field f-producto"><input class="ni-producto" type="text" placeholder="Nombre del producto" /></div>
    <div class="field f-cant"><input class="ni-cantidad" type="number" placeholder="Cantidad" /></div>
    <div class="field f-unidad"><input class="ni-unidad" type="text" placeholder="Unidad (ud, caja...)" /></div>
    <button class="remove-item ghost" type="button">×</button>
  `;
  div.querySelector(".remove-item").onclick = ()=> div.remove();
  container.appendChild(div);
}

async function submitOC(){
  const provSelect = document.getElementById("oc-proveedor");
  const numero = document.getElementById("oc-numero").value.trim();
  const fecha = document.getElementById("oc-fecha").value;
  const nota = document.getElementById("oc-nota").value.trim();
  const resultBox = document.getElementById("oc-result");

  let provCode = provSelect.value;

  if(!provCode){
    resultBox.innerHTML = `<p style="color:var(--red);font-size:13px;">Selecciona o crea un proveedor.</p>`;
    return;
  }
  if(!numero){
    resultBox.innerHTML = `<p style="color:var(--red);font-size:13px;">Ingresa el número de OC.</p>`;
    return;
  }

  const btn = document.getElementById("submit-oc-btn");
  btn.disabled = true;
  btn.textContent = "Creando...";

  if(provCode === "__nuevo__"){
    const nombre = document.getElementById("oc-nuevo-nombre").value.trim();
    if(!nombre){
      resultBox.innerHTML = `<p style="color:var(--red);font-size:13px;">Ingresa el nombre del nuevo proveedor.</p>`;
      btn.disabled = false; btn.textContent = "Registrar orden";
      return;
    }
    const code = slugify(nombre);
    const { error } = await supabaseClient.from("oc_proveedores").insert({ code, nombre });
    if(error){
      resultBox.innerHTML = `<p style="color:var(--red);font-size:13px;">Error creando proveedor: ${escapeHtml(error.message)}</p>`;
      btn.disabled = false; btn.textContent = "Registrar orden";
      return;
    }
    provCode = code;
    await loadProveedoresCache();
  }

  const itemsRows = Array.from(document.querySelectorAll(".new-item-row")).map(row=>({
    producto: row.querySelector(".ni-producto").value.trim(),
    cantidad: parseFloat(row.querySelector(".ni-cantidad").value) || null,
    unidad: row.querySelector(".ni-unidad").value.trim()
  })).filter(it => it.producto);

  const { data: ordenData, error: ordenError } = await supabaseClient.from("oc_ordenes").insert({
    numero_oc: numero,
    proveedor_code: provCode,
    fecha_estimada: fecha || null,
    nota_general: nota || null
  }).select().single();

  if(ordenError){
    resultBox.innerHTML = `<p style="color:var(--red);font-size:13px;">Error creando la orden: ${escapeHtml(ordenError.message)}</p>`;
    btn.disabled = false; btn.textContent = "Registrar orden";
    return;
  }

  if(itemsRows.length > 0){
    const itemsToInsert = itemsRows.map(it => ({ ...it, orden_id: ordenData.id, estado: "Aprobado" }));
    await supabaseClient.from("oc_items").insert(itemsToInsert);
  }

  const link = buildProviderLink(provCode);
  resultBox.innerHTML = `
    <p style="color:var(--green);font-size:13.5px;margin-bottom:10px;">Orden ${escapeHtml(numero)} creada correctamente.</p>
    <div class="link-box">
      <input readonly value="${link}" onclick="this.select()" />
      <button class="small" onclick="copyToClipboard('${link}')">Copiar link</button>
    </div>
  `;
  btn.disabled = false;
  btn.textContent = "Registrar orden";

  document.getElementById("oc-numero").value = "";
  document.getElementById("oc-nota").value = "";
  document.getElementById("oc-fecha").value = "";
  document.getElementById("oc-proveedor").value = "";
  document.getElementById("oc-nuevo-nombre").value = "";
  document.getElementById("nuevo-proveedor-box").style.display = "none";
  document.getElementById("items-container").innerHTML = "";
  addItemRow();
  addItemRow();
}

/* ---- TAB: PROVEEDORES ---- */
function renderTabProveedores(){
  const content = document.getElementById("tab-content");
  let html = `
    <div class="card">
      <h2>Proveedores</h2>
      <p class="subtitle" style="margin-bottom:6px;">Comparte el link personalizado de cada proveedor para que actualice sus órdenes.</p>
  `;
  if(proveedoresCache.length === 0){
    html += `<p class="empty">Todavía no hay proveedores. Se crean automáticamente al registrar una OC nueva.</p>`;
  } else {
    proveedoresCache.forEach(p=>{
      const link = buildProviderLink(p.code);
      html += `
        <div class="prov-row">
          <div>
            <div class="prov-name">${escapeHtml(p.nombre)}</div>
            <div class="prov-code">${p.code}</div>
          </div>
          <div class="link-box">
            <input readonly value="${link}" onclick="this.select()" />
            <button class="small" onclick="copyToClipboard('${link}')">Copiar link</button>
          </div>
        </div>
      `;
    });
  }
  html += `</div>`;
  content.innerHTML = html;
}

function buildProviderLink(code){
  const base = window.location.origin + window.location.pathname;
  return `${base}?prov=${code}`;
}

function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(()=> showToast("Link copiado"));
}

boot();
</script>
